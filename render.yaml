services:
  # ─── Backend ──────────────────────────────────────────────────────────────────
  - type: web
    name: ai-video-factory-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: HUGGINGFACE_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: media-storage
      mountPath: /opt/render/project/src
      sizeGB: 1

  # ─── Frontend ─────────────────────────────────────────────────────────────────
  - type: web
    name: ai-video-factory-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve dist -l $PORT
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: NODE_VERSION
        value: 20.11.0
